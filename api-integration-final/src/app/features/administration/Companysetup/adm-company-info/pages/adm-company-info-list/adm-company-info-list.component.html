<div class="page">
  <div
    *ngIf="loading"
    style="min-height: 300px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600;"
  >
    Loading...
  </div>

  <ng-container *ngIf="!loading">
    <ui-table
      [data]="rows"
      [columns]="columns"
      [actions]="actions"
      [features]="tableFeatures"
      [loading]="false"
      [title]="''"
      [emptyTitle]="'No company found'"
      [emptyDescription]="'There are no company records to display.'"
      [exportFileName]="'company-information'"
      (refreshClick)="load()"
      (selectionChange)="onSelectionChange($event)"
    >
      <button
        table-actions
        mat-flat-button
        color="primary"
        type="button"
        class="page__add-btn"
        (click)="addNew()"
      >
        Add Company
      </button>
    </ui-table>
  </ng-container>

  <app-adm-company-info-form-modal
    *ngIf="isModalOpen"
    [model]="selectedRow"
    (closed)="closeModal()"
    (saved)="onSaved()"
  ></app-adm-company-info-form-modal>
</div>
