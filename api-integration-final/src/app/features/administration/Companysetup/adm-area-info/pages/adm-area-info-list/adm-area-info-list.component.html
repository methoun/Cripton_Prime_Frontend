<div class="page">
  <ui-table
    [data]="rows"
    [columns]="columns"
    [actions]="actions"
    [features]="tableFeatures"
    [title]="'Area Information'"
    [subtitle]="'Manage area master entries.'"
    [loading]="loading"
    [exportFileName]="'area-information'"
    [emptyTitle]="'No area found'"
    [emptyDescription]="'There are no area records to display.'"
    (refreshClick)="load()"
    (selectionChange)="onSelectionChange($event)"
  >
    <button table-actions type="button" class="page__add-btn" (click)="addNew()">
      Add Area
    </button>
  </ui-table>

  <app-adm-area-info-form-modal
    [isOpen]="isModalOpen"
    [model]="selectedRow"
    (cancel)="closeModal()"
    (saved)="onSaved()"
  >
  </app-adm-area-info-form-modal>
</div>
