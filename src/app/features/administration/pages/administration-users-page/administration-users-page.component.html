<div class="users-page">
  <div class="page-shell">
    <div class="page-head">
      <div class="page-head__left">
        <div class="title-wrap"></div>
      </div>

      <div class="page-head__right">
        <ui-button
          label="Add User"
          icon="person_add"
          variant="flat"
          color="primary"
          (click)="openCreateDialog()"
        ></ui-button>
      </div>
    </div>

   <ui-table
      [title]="''"
      [data]="rows"
      [columns]="columns"
      [actions]="rowActions"
      [loading]="loading"
      [searchEnabled]="true"
      [enableExport]="true"
      [exportFileName]="'users'"
      [pageSize]="25"
      [pageSizeOptions]="[25, 50, 100]"
      [searchLabel]="'Search users'"
      [searchPlaceholder]="'Search by username, email, role or status'"
      [emptyTitle]="'No users found'"
      [emptyDescription]="'Create a user or adjust your search filter.'"
      (actionClick)="onTableAction($event)"
    >
      <button
        table-left-actions
        mat-stroked-button
        type="button"
        class="ui-table__export-btn"
        (click)="loadUsers()"
      >
    <mat-icon>refresh</mat-icon>
    <span>Refresh</span>
  </button>
</ui-table>
  </div>
</div>
