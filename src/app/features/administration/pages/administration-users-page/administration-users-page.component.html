<div class="users-page">
  <div class="page-shell">
    <div class="page-head">
      <div class="page-head__left">
        <span class="section-badge">Administration</span>
        <div class="title-wrap">
          <h1>Users</h1>
          <p>Manage company users, roles and account status.</p>
        </div>
      </div>

      <div class="page-head__right">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search user</mat-label>
          <input
            matInput
            placeholder="Search by username, email, role or status"
            (input)="applyFilter($event)"
          />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" class="add-btn" (click)="openCreateDialog()">
          <mat-icon>person_add</mat-icon>
          Add User
        </button>
      </div>
    </div>

    <div class="table-card">
      <table mat-table [dataSource]="dataSource" matSort class="users-table mat-elevation-z0">

        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Username</th>
          <td mat-cell *matCellDef="let row">
            <div class="user-cell">
              <span class="user-cell__name">{{ row.username }}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let row">
            <span class="email-text">{{ row.email }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
          <td mat-cell *matCellDef="let row">
            <span
              class="role-chip"
              [class.role-chip--admin]="row.role === 'Admin'"
              [class.role-chip--user]="row.role !== 'Admin'"
            >
              {{ row.role || '-' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let row">
            <span
              class="status-chip"
              [class.status-chip--active]="row.isActive"
              [class.status-chip--inactive]="!row.isActive"
            >
              {{ row.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
          <td mat-cell *matCellDef="let row" class="actions-col">
            <div class="action-group">
              <button mat-icon-button class="action-btn action-btn--edit" (click)="editUser(row)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button class="action-btn action-btn--delete" (click)="deleteUser(row)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: false"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">
            <div class="empty-state">
              <div class="empty-state__icon">
                <mat-icon>inbox</mat-icon>
              </div>
              <div>
                <div class="empty-state__title">No users found</div>
                <div class="empty-state__text">Create a user or adjust your search filter.</div>
              </div>
            </div>
          </td>
        </tr>
      </table>

      <mat-paginator
        [pageSize]="5"
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</div>
