<div class="backdrop" *ngIf="isOpen">
  <div class="modal">
    <div class="header">
      <h3>{{ isEdit ? 'Edit Area' : 'Create Area' }}</h3>
      <button type="button" class="close" (click)="close()">×</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="grid">
        <div class="field">
          <label>Company Id *</label>
          <input type="text" formControlName="compId" />
        </div>

        <div class="field">
          <label>Area Name *</label>
          <input type="text" formControlName="areaName" />
        </div>

        <div class="field">
          <label>Area Name (Bangla)</label>
          <input type="text" formControlName="areaNameBng" />
        </div>

        <div class="field span-2">
          <label>Area Address (Eng)</label>
          <textarea rows="3" formControlName="areaAddressEng"></textarea>
        </div>

        <div class="field span-2">
          <label>Area Address (Bangla)</label>
          <textarea rows="3" formControlName="areaAddressBng"></textarea>
        </div>

        <div class="field">
          <label>Short Name</label>
          <input type="text" formControlName="shortName" />
        </div>

        <div class="field">
          <label>Short Name (Bangla)</label>
          <input type="text" formControlName="shortNameBng" />
        </div>

        <div class="field">
          <label>Sort Order</label>
          <input type="number" formControlName="sortOrder" />
        </div>

        <label class="check">
          <input type="checkbox" formControlName="isActive" />
          <span>Active</span>
        </label>
      </div>

      <div class="actions">
        <button type="button" class="btn" (click)="close()">Cancel</button>
        <button type="submit" class="btn primary" [disabled]="saving">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
