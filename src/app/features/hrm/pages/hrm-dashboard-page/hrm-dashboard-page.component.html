<div class='dash-board'>
  <section class='dash-hero erp-surface'>
    <div>
      <div class='dash-eyebrow'>Human Resource</div>
      <h1>HRM Dashboard</h1>
      <p>Track workforce, attendance and leave operations from a compact reusable module dashboard.</p>
      <div class='dash-actions'>
        <ui-button label='Employees' icon='groups' routerLink='/hrm'></ui-button>
        <ui-button label='Attendance' icon='schedule' variant='stroked'></ui-button>
      </div>
    </div>
  </section>

  <div class='dash-stats'>
    @for (item of stats; track item.label) {
      <ui-card>
        <div class='mini-stat'>
          <div class='mini-stat__label'>{{ item.label }}</div>
          <div class='mini-stat__value'>{{ item.value }}</div>
        </div>
      </ui-card>
    }
  </div>
</div>
