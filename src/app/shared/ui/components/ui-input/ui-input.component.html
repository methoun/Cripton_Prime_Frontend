<mat-form-field class="ui-field" appearance="outline">
  <mat-label>
    {{ label }}
    @if (required) {
      <span class="ui-field__required">*</span>
    }
  </mat-label>

  @if (prefixIcon) {
    <mat-icon matPrefix>{{ prefixIcon }}</mat-icon>
  }

  <input
    matInput
    [type]="type"
    [placeholder]="placeholder || ''"
    [formControl]="control"
    [required]="false"
    [attr.autocomplete]="autocomplete || null"
  />

  @if (suffixIcon) {
    <mat-icon matSuffix>{{ suffixIcon }}</mat-icon>
  }

  @if (hint && !(control.touched && control.invalid)) {
    <mat-hint>{{ hint }}</mat-hint>
  }

  @if (control.touched && control.invalid) {
    <mat-error>{{ getErrorMessage() }}</mat-error>
  }
</mat-form-field>
