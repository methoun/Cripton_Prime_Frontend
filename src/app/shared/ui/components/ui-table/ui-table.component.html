<div class="ui-table">
  <div class="ui-table__toolbar" *ngIf="hasToolbar()">
    <div class="ui-table__toolbar-left">
      <div class="ui-table__heading" *ngIf="title || subtitle">
        <h3 class="ui-table__title" *ngIf="title">{{ title }}</h3>
        <p class="ui-table__subtitle" *ngIf="subtitle">{{ subtitle }}</p>
      </div>

      <div class="ui-table__selection-summary" *ngIf="isSelectionEnabled() && selection.selected.length > 0">
        <mat-icon>check_circle</mat-icon>
        <span>{{ selection.selected.length }} selected</span>
      </div>

      <div class="ui-table__toolbar-actions">
        <button
          *ngIf="isRefreshEnabled()"
          mat-stroked-button
          type="button"
          class="ui-table__toolbar-btn"
          (click)="onRefresh()"
        >
          <mat-icon>refresh</mat-icon>
          <span>Refresh</span>
        </button>

        <button
          *ngIf="isExportEnabled()"
          mat-stroked-button
          type="button"
          class="ui-table__toolbar-btn"
          [matMenuTriggerFor]="exportMenu"
        >
          <mat-icon>download</mat-icon>
          <span>Export</span>
        </button>

        <mat-menu #exportMenu="matMenu">
          <button mat-menu-item *ngIf="isExcelExportEnabled()" (click)="exportExcel()">
            <mat-icon>table_view</mat-icon>
            <span>Export Excel</span>
          </button>

          <button mat-menu-item *ngIf="isCsvExportEnabled()" (click)="exportCsv()">
            <mat-icon>description</mat-icon>
            <span>Export CSV</span>
          </button>
        </mat-menu>
      </div>
    </div>

    <div class="ui-table__toolbar-right">
      <div class="ui-table__search" *ngIf="isSearchEnabled()">
        <input
          class="ui-table__search-input"
          type="text"
          [value]="searchTerm"
          [placeholder]="searchPlaceholder"
          [attr.aria-label]="searchLabel"
          (input)="onSearchInput($event)"
        />

        <button
          *ngIf="searchTerm"
          class="ui-table__search-btn"
          type="button"
          aria-label="Clear search"
          (click)="clearSearch()"
        >
          <mat-icon>close</mat-icon>
        </button>

        <span class="ui-table__search-icon" *ngIf="!searchTerm">
          <mat-icon>search</mat-icon>
        </span>
      </div>

      <div class="ui-table__external-actions">
        <ng-content select="[table-actions]"></ng-content>
      </div>
    </div>
  </div>

  <div class="ui-table__card">
    <div
      class="ui-table__table-wrap"
      [class.is-loading]="loading && isLoadingOverlayEnabled()"
      [class.ui-table__table-wrap--scrollable]="isHorizontalScrollEnabled()"
    >
      <table mat-table matSort [dataSource]="dataSource" class="ui-table__table">
        <ng-container [matColumnDef]="selectionColumnKey" *ngIf="isSelectionEnabled()">
          <th mat-header-cell *matHeaderCellDef class="ui-table__select-cell">
            <mat-checkbox
              [checked]="isAllSelected()"
              [indeterminate]="isSomeSelected()"
              (change)="toggleAllRows($event.checked)"
            ></mat-checkbox>
          </th>

          <td mat-cell *matCellDef="let row" class="ui-table__select-cell">
            <mat-checkbox
              [checked]="selection.isSelected(row)"
              (click)="$event.stopPropagation()"
              (change)="toggleRowSelection(row, $event.checked)"
            ></mat-checkbox>
          </td>
        </ng-container>

        <ng-container
          *ngFor="let column of getVisibleColumns(); trackBy: trackByColumn"
          [matColumnDef]="getColumnName(column)"
        >
          <th
            mat-header-cell
            *matHeaderCellDef
            [style.width]="column.width || null"
            [style.min-width]="column.minWidth || column.width || null"
            [class]="column.headerClass || ''"
          >
            <ng-container *ngIf="isColumnSortable(column); else plainHeader">
              <div [mat-sort-header]="getColumnName(column)">
                {{ column.header }}
              </div>
            </ng-container>

            <ng-template #plainHeader>
              {{ column.header }}
            </ng-template>
          </th>

          <td
            mat-cell
            *matCellDef="let row"
            [style.min-width]="column.minWidth || column.width || null"
            [class]="column.cellClass || ''"
          >
            <ng-container *ngIf="isBadgeColumn(column); else defaultCell">
              <span [class]="getBadgeClass(getCellValue(row, column))">
                {{ getBadgeLabel(getCellValue(row, column)) }}
              </span>
            </ng-container>

            <ng-template #defaultCell>
              {{ getCellValue(row, column) ?? '—' }}
            </ng-template>
          </td>
        </ng-container>

        <ng-container [matColumnDef]="actionsColumnKey" *ngIf="hasActions()">
          <th mat-header-cell *matHeaderCellDef class="ui-table__actions-header">Actions</th>

          <td mat-cell *matCellDef="let row" class="ui-table__actions-cell">
            <div class="ui-table__actions">
              <ng-container *ngFor="let action of actions; trackBy: trackByAction">
                <ng-container *ngIf="!isActionHidden(action, row)">
                  <button
                    *ngIf="(action.variant || 'icon') === 'icon'"
                    mat-icon-button
                    type="button"
                    class="ui-table__action-btn ui-table__action-btn--icon"
                    [color]="action.color || 'primary'"
                    [disabled]="isActionDisabled(action, row)"
                    [matTooltip]="action.tooltip || action.label"
                    (click)="$event.stopPropagation(); onAction(action, row)"
                  >
                    <mat-icon>{{ action.icon || 'more_horiz' }}</mat-icon>
                  </button>

                  <button
                    *ngIf="(action.variant || 'icon') === 'stroked'"
                    mat-stroked-button
                    type="button"
                    class="ui-table__action-btn ui-table__action-btn--compact"
                    [color]="action.color || 'primary'"
                    [disabled]="isActionDisabled(action, row)"
                    (click)="$event.stopPropagation(); onAction(action, row)"
                  >
                    <mat-icon *ngIf="action.icon">{{ action.icon }}</mat-icon>
                    <span>{{ action.label }}</span>
                  </button>

                  <button
                    *ngIf="(action.variant || 'icon') === 'flat'"
                    mat-flat-button
                    type="button"
                    class="ui-table__action-btn ui-table__action-btn--compact"
                    [color]="action.color || 'primary'"
                    [disabled]="isActionDisabled(action, row)"
                    (click)="$event.stopPropagation(); onAction(action, row)"
                  >
                    <mat-icon *ngIf="action.icon">{{ action.icon }}</mat-icon>
                    <span>{{ action.label }}</span>
                  </button>
                </ng-container>
              </ng-container>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: isStickyHeaderEnabled()"></tr>

        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="ui-table__row"
          [class.ui-table__row--clickable]="isRowClickEnabled()"
          (click)="onRowClick(row)"
        ></tr>
      </table>

      <div class="ui-table__loading-overlay" *ngIf="loading && isLoadingOverlayEnabled()">
        <mat-spinner diameter="36"></mat-spinner>
        <div class="ui-table__loading-text">Loading...</div>
      </div>

      <div
        class="ui-table__empty"
        *ngIf="isEmptyStateEnabled() && !loading && dataSource.filteredData.length === 0"
      >
        <mat-icon class="ui-table__empty-icon">inbox</mat-icon>
        <div class="ui-table__empty-title">{{ emptyTitle }}</div>
        <div class="ui-table__empty-description">{{ emptyDescription || emptySubtitle }}</div>
      </div>
    </div>

    <mat-paginator
      *ngIf="isPaginationEnabled()"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      [showFirstLastButtons]="showFirstLastButtons"
      (page)="onPage($event)"
    >
    </mat-paginator>
  </div>
</div>
