<ng-container *ngIf="useOverlay; else inlineModal">
  <div class="ui-modal-backdrop" *ngIf="isOpen" (click)="onBackdropClick()">
    <div [ngClass]="modalClass" (click)="$event.stopPropagation()">
      <div class="ui-modal__header">
        <div class="ui-modal__heading">
          <div class="ui-modal__title-wrap">
            <mat-icon *ngIf="icon" class="ui-modal__icon">{{ icon }}</mat-icon>

            <div>
              <h2 class="ui-modal__title">{{ title }}</h2>
              <p *ngIf="subtitle" class="ui-modal__subtitle">{{ subtitle }}</p>
            </div>
          </div>

          <button
            *ngIf="showClose"
            mat-icon-button
            type="button"
            class="ui-modal__close"
            (click)="onClose()"
          >
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <div class="ui-modal__body">
        <ng-content></ng-content>
      </div>

      <div class="ui-modal__footer" *ngIf="showFooter">
        <button
          *ngIf="!hideSecondary"
          mat-stroked-button
          type="button"
          (click)="onSecondary()"
        >
          {{ secondaryText }}
        </button>

        <button
          mat-flat-button
          color="primary"
          type="button"
          [disabled]="primaryDisabled"
          (click)="onPrimary()"
        >
          {{ primaryText }}
        </button>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #inlineModal>
  <div [ngClass]="modalClass">
    <div class="ui-modal__header">
      <div class="ui-modal__heading">
        <div class="ui-modal__title-wrap">
          <mat-icon *ngIf="icon" class="ui-modal__icon">{{ icon }}</mat-icon>

          <div>
            <h2 class="ui-modal__title">{{ title }}</h2>
            <p *ngIf="subtitle" class="ui-modal__subtitle">{{ subtitle }}</p>
          </div>
        </div>

        <button
          *ngIf="showClose"
          mat-icon-button
          type="button"
          class="ui-modal__close"
          (click)="onClose()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>

    <div class="ui-modal__body">
      <ng-content></ng-content>
    </div>

    <div class="ui-modal__footer" *ngIf="showFooter">
      <button
        *ngIf="!hideSecondary"
        mat-stroked-button
        type="button"
        (click)="onSecondary()"
      >
        {{ secondaryText }}
      </button>

      <button
        mat-flat-button
        color="primary"
        type="button"
        [disabled]="primaryDisabled"
        (click)="onPrimary()"
      >
        {{ primaryText }}
      </button>
    </div>
  </div>
</ng-template>
